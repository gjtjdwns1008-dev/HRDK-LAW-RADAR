name: HRDK LAW-RADAR

on:
  schedule:
    # 🎲 하루 44회, 한국시간 기준 변동 간격(22~38분)으로 분산 시도.
    # 법제처 IP 차단이 종일 무작위이므로, 24시간 촘촘히 시도해 '안 막힌 IP' 당첨 확률↑
    # 정각·10분 단위를 피해(다른 자동화 툴과 겹침 방지) 어중간한 분으로 배치.
    # monitor와는 최소 10분 이상 엇갈리게 하여 제미나이/IP 부하 분산.
    # 이미 처리한 날짜는 백필이 자동으로 건너뜀 (중복 처리 없음).
    # ⚠️ Public 레포 → Actions 분 무제한이므로 다회 실행 가능.
    # (cron은 UTC 기준. 한국시간 = UTC + 9)
    - cron: '7 15 * * *'   # KST 00:07
    - cron: '32 15 * * *'   # KST 00:32
    - cron: '4 16 * * *'   # KST 01:04
    - cron: '42 16 * * *'   # KST 01:42
    - cron: '22 17 * * *'   # KST 02:22
    - cron: '51 17 * * *'   # KST 02:51
    - cron: '26 18 * * *'   # KST 03:26
    - cron: '3 19 * * *'   # KST 04:03
    - cron: '39 19 * * *'   # KST 04:39
    - cron: '8 20 * * *'   # KST 05:08
    - cron: '36 20 * * *'   # KST 05:36
    - cron: '2 21 * * *'   # KST 06:02
    - cron: '33 21 * * *'   # KST 06:33
    - cron: '58 21 * * *'   # KST 06:58
    - cron: '34 22 * * *'   # KST 07:34
    - cron: '56 22 * * *'   # KST 07:56
    - cron: '33 23 * * *'   # KST 08:33
    - cron: '5 0 * * *'   # KST 09:05
    - cron: '33 0 * * *'   # KST 09:33
    - cron: '7 1 * * *'   # KST 10:07
    - cron: '37 1 * * *'   # KST 10:37
    - cron: '14 2 * * *'   # KST 11:14
    - cron: '48 2 * * *'   # KST 11:48
    - cron: '26 3 * * *'   # KST 12:26
    - cron: '54 3 * * *'   # KST 12:54
    - cron: '18 4 * * *'   # KST 13:18
    - cron: '49 4 * * *'   # KST 13:49
    - cron: '25 5 * * *'   # KST 14:25
    - cron: '51 5 * * *'   # KST 14:51
    - cron: '22 6 * * *'   # KST 15:22
    - cron: '44 6 * * *'   # KST 15:44
    - cron: '17 7 * * *'   # KST 16:17
    - cron: '55 7 * * *'   # KST 16:55
    - cron: '32 8 * * *'   # KST 17:32
    - cron: '6 9 * * *'   # KST 18:06
    - cron: '43 9 * * *'   # KST 18:43
    - cron: '8 10 * * *'   # KST 19:08
    - cron: '43 10 * * *'   # KST 19:43
    - cron: '21 11 * * *'   # KST 20:21
    - cron: '58 11 * * *'   # KST 20:58
    - cron: '32 12 * * *'   # KST 21:32
    - cron: '14 13 * * *'   # KST 22:14
    - cron: '49 13 * * *'   # KST 22:49
    - cron: '26 14 * * *'   # KST 23:26
  workflow_dispatch:
    inputs:
      manual_date:
        description: '특정 일자 수동 분석 (YYYYMMDD, 비우면 자동 백필)'
        required: false
        default: ''

jobs:
  run-radar:
    runs-on: ubuntu-latest
    # 동시 실행 방지: 앞 실행이 안 끝났으면 이번 건 취소 (중복/충돌 방지)
    concurrency:
      group: radar-run
      cancel-in-progress: false
    steps:
    - name: 📂 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 필수 라이브러리 설치
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m pip install --upgrade pip
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        pip install -r requirements.txt

    - name: 🌐 [진단] 이번 실행 서버 IP 확인
      run: |
        curl -s --max-time 10 https://ipinfo.io/json | grep -E '"ip"|"country"|"org"' || echo "IP 조회 실패"

    - name: "🚀 메인 스크립트 실행 (백필: 안 되는 날은 즉시 종료, 다음 회차에 따라잡기)"
      env:
        LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        WORKNET_API_KEY: ${{ secrets.WORKNET_API_KEY }}
        DB_PATH: hrdk_law.db
        MANUAL_DATE: ${{ github.event.inputs.manual_date }}
      run: python main.py
