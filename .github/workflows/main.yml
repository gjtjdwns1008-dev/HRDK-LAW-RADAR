name: HRDK LAW-RADAR

on:
  schedule:
    # ⏰ 깃허브는 UTC 기준이므로, 한국 새벽 4시 = UTC 전날 밤 7시(19)입니다.
    - cron: '19 18 * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 필수 라이브러리 설치
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m pip install --upgrade pip
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        pip install -r requirements.txt

    - name: 🚀 HRDK LAW-RADAR 메인 스크립트 실행 (법제처 타임아웃 시 최대 3회 자동 재시도)
      env:
        LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        WORKNET_API_KEY: ${{ secrets.WORKNET_API_KEY }}
        DB_PATH: hrdk_law.db
      run: |
        # 법제처 서버가 일시적으로 응답 안 할 때를 대비해 5분 간격으로 최대 3번 재시도합니다.
        # python main.py가 종료코드 0(성공)을 내면 즉시 break, 1(실패)이면 대기 후 재시도.
        for i in 1 2 3; do
          echo "🔄 실행 시도 $i/3..."
          python main.py && break
          if [ $i -lt 3 ]; then
            echo "⏳ 법제처 서버 회복 대기 중... 5분 후 재시도합니다."
            sleep 300
          else
            echo "💀 3회 모두 실패. 오늘 수집을 종료합니다."
            exit 1
          fi
        done
