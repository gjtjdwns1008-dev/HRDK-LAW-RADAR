name: HRDK LAW-RADAR

on:
  schedule:
    # ⏰ 깃허브는 UTC 기준이므로, 한국 새벽 4시 = UTC 전날 밤 7시(19)입니다.
    - cron: '19 18 * * *'
  workflow_dispatch: # 🔘 수동으로 테스트 실행할 수 있는 버튼을 만들어줍니다.

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 필수 라이브러리 설치
      # GITHUB_TOKEN은 GitHub Actions가 자동으로 제공합니다. (별도 등록 불필요)
      # requirements.txt의 hrdk-law-core 설치 시 같은 계정 private 레포에 접근하기 위해 사용합니다.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 HRDK LAW-RADAR 메인 스크립트 실행
      env:
        LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        WORKNET_API_KEY: ${{ secrets.WORKNET_API_KEY }}
        DB_PATH: hrdk_law.db
      run: python main.py
