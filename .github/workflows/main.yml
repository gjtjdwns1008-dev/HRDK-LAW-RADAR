name: HRDK LAW-RADAR

on:
  schedule:
    # 🎲 하루 5회, 한국시간 기준 랜덤하게 분산된 시각에 시도합니다.
    # GitHub IP는 매 실행 무작위 추첨이므로, 여러 번 시도하면 '안 막힌 IP' 당첨 확률↑
    # 이미 처리한 날짜는 백필이 자동으로 건너뛰므로 중복 처리 없음 (안전).
    # (cron은 UTC 기준. 한국시간 = UTC + 9)
    - cron: '13 19 * * *'   # KST 04:13
    - cron: '47 23 * * *'   # KST 08:47
    - cron: '31 3 * * *'    # KST 12:31
    - cron: '9 7 * * *'     # KST 16:09
    - cron: '52 11 * * *'   # KST 20:52
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 필수 라이브러리 설치
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m pip install --upgrade pip
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        pip install -r requirements.txt

    - name: 🌐 [진단] 이번 실행 서버 IP 확인
      run: |
        echo "=================================================="
        echo "이번 GitHub Actions 실행 서버의 IP 정보"
        echo "=================================================="
        curl -s --max-time 10 https://ipinfo.io/json | grep -E '"ip"|"city"|"country"|"org"' || echo "IP 조회 실패"
        echo "=================================================="

    - name: "🚀 메인 스크립트 실행 (백필 - 안 되는 날은 즉시 종료, 다음 날 따라잡기)"
      env:
        LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        WORKNET_API_KEY: ${{ secrets.WORKNET_API_KEY }}
        DB_PATH: hrdk_law.db
      run: |
        # 백필 구조: main.py가 스스로 연결 확인 → 안 되면 종료(다음 날 자동 따라잡기).
        python main.py
