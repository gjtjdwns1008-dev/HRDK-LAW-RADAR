name: AI Law Monitoring & Worknet Mashup Pipeline

on:
  schedule:
    # 한국 시간(KST) 매일 아침 8시 실행 (UTC 기준 23시)
    - cron: '0 23 * * *'
  workflow_dispatch: # 깃허브에서 수동 버튼 클릭으로도 실행 가능

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI Law Monitoring System
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
          WORKNET_API_KEY: ${{ secrets.WORKNET_API_KEY }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        run: |
          python main.py
