name: "일회성 - 미매칭 법령 Track코드 보강"

# 직능연엔 있으나 기준조항에 없어 Track 코드가 빈 법령들을
# 법제처 본문 + AI로 분석해 우대사항_대장에 채웁니다.
# 한 번만 돌리면 됩니다. Actions 탭 → Run workflow.
# 법제처 연결되는 날 실행하세요 (IP 차단일이면 실패 가능).
on:
  workflow_dispatch:

jobs:
  fill-codes:
    runs-on: ubuntu-latest
    steps:
    - name: 📂 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 필수 라이브러리 설치
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m pip install --upgrade pip
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        pip install -r requirements.txt

    - name: 🌐 [진단] 실행 IP 확인
      run: |
        echo "IP check:"
        curl -s --max-time 10 https://ipinfo.io/ip || echo unknown

    - name: "🧩 미매칭 법령 Track 코드 보강 (일회성)"
      env:
        LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        DB_PATH: hrdk_law.db
      run: python scripts/fill_missing_track_codes.py
